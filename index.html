<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "Segoe UI", Tahoma, sans-serif; 
            background: linear-gradient(135deg, #0078d4 0%, #00182b 100%); 
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        h1 { font-size: 3.5rem; margin-bottom: 30px; letter-spacing: -1px; }
        .message {
            font-size: 1.6rem;
            line-height: 1.6;
            font-style: italic;
            margin-bottom: 40px;
            color: #e0e0e0;
        }
        .highlight {
            background: #107c10;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(16, 124, 16, 0.4);
        }
        .footer-note { margin-top: 40px; opacity: 0.6; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Thank you sir!</h1>
        <p class="message">
            "My first deployment using Git! The Azure classes have been excellent. Thank you for explaining these difficult concepts in such an easy-to-understand way and clearing all my doubts."
        </p>
        <div class="highlight">🚀 STATUS: LIVE ON GITHUB PAGES</div>
       
    </div>
</body>
</html>'
